<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>教师题目管理</title>
    <script src="/static/js/lib/axios.min.js"></script>
    <link href="/static/css/lib/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/teacher_problem_manage.css" rel="stylesheet">
</head>
<body>
    <header>
        <h1>教师管理面板</h1>
        <div class="user-info">
            <a href="/problems">返回</a>
        </div>
    </header>

    <div class="tabs">
        <button class="tab-button active" onclick="switchTab('problems')">题目管理</button>
        <button class="tab-button" onclick="switchTab('groups')">题组管理</button>
    </div>

    <div id="problems-tab" class="tab-content">
        <div class="section">
            <h2>题目管理</h2>
            <div class="form-group">
                <select id="problemSelect" onchange="selectProblem(this)">
                    <option disabled selected>请选择题目</option>
                </select>
                <button onclick="addProblemForm()">新建题目</button>
            </div>
            <div id="problemEditor"></div>
        </div>
    </div>

    <div id="groups-tab" class="tab-content" style="display: none;">
        <div class="section">
            <h2>题组管理</h2>
            <div class="form-group">
                <select id="groupSelect" onchange="selectGroup(this)">
                    <option disabled selected>请选择题组</option>
                </select>
                <button onclick="addGroupForm()">新建题组</button>
            </div>
            <div id="groupEditor"></div>
        </div>
    </div>
    
    <div class="footer">
        <p>&copy; <span id="currentYear"></span> BCMOJ. Released under the <a href="https://opensource.org/licenses/MIT" target="_blank">MIT License</a>. | <a href="/about">关于我们</a></p>
    </div>

    <div class="toast-container"></div>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/lib/bootstrap.bundle.min.js"></script>
    <script src="/static/js/teacher_problem_manage.js"></script>
</body>
</html>
