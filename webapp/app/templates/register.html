<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册</title>
    <link rel="stylesheet" href="/static/css/lib/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/lib/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/register.css">
    <style></style>
    </style>
</head>
<body>
    <div class="toast-container"></div>
    <div class="page-wrapper">
        <div class="register-container">
            <h1><i class="bi bi-person-plus me-2"></i>注册</h1>

            <form method="POST" action="{{ url_for('register') }}">
                <div class="form-group">
                    <label for="username"><i class="bi bi-person me-1"></i>用户名</label>
                    <input type="text" class="form-control" id="username" name="username" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label for="email"><i class="bi bi-envelope me-1"></i>邮箱</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="请输入邮箱">
                </div>
                <div class="form-group">
                    <label for="password"><i class="bi bi-lock me-1"></i>密码</label>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="请输入密码">
                </div>
                <div class="form-group">
                    <label for="confirm_password"><i class="bi bi-lock me-1"></i>确认密码</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" required placeholder="请再次输入密码">
                </div>
                <div class="form-group">
                    <label for="captcha"><i class="bi bi-shield-lock me-1"></i>验证码</label>
                    <div class="d-flex align-items-center">
                        <input type="text" class="form-control me-2" id="captcha" name="captcha" required placeholder="请输入验证码" maxlength="6" style="flex: 1;">
                        <img id="captcha-img" src="/captcha" alt="验证码" class="border rounded" style="cursor: pointer; height: 40px;" onclick="refreshCaptcha()">
                        <button type="button" class="btn btn-outline-secondary ms-2" onclick="refreshCaptcha()">刷新</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-register"><i class="bi bi-person-plus me-2"></i>注册</button>
            </form>

            <div class="links">
                已经有账户? <a href="{{ url_for('login') }}">登录</a>
            </div>
        </div>
    </div>

    <div class="footer">
  <p>&copy; <span id="currentYear"></span> BCMOJ. Released under the <a href="https://opensource.org/licenses/MIT  " target="_blank">MIT License</a>. | <a href="/about">关于我们</a></p>
</div>

    <script src="/static/js/common.js"></script>
    <script src="/static/js/lib/popper.min.js"></script>
    <script src="/static/js/lib/bootstrap.min.js"></script>
    <script>
    function showToast(message, type = 'info', title = '系统通知') {
        const toastContainer = document.querySelector('.toast-container');
        const toastId = 'toast-' + Date.now();
        let icon = 'bi-info-circle';
        if (type === 'success') icon = 'bi-check-circle';
        else if (type === 'error') icon = 'bi-x-circle';
        else if (type === 'warning') icon = 'bi-exclamation-circle';
        const toastEl = document.createElement('div');
        toastEl.className = `toast toast-${type}`;
        toastEl.id = toastId;
        toastEl.setAttribute('role', 'alert');
        toastEl.setAttribute('aria-live', 'assertive');
        toastEl.setAttribute('aria-atomic', 'true');
        toastEl.innerHTML = `
            <div class="toast-header">
                <i class="bi ${icon} me-2"></i>
                <strong class="me-auto">${title}</strong>
                <small>刚刚</small>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body">
                ${message}
            </div>
        `;
        toastContainer.appendChild(toastEl);
        const toast = new bootstrap.Toast(toastEl, {
            delay: 5000
        });
        toast.show();
        toastEl.addEventListener('hidden.bs.toast', function () {
            toastEl.remove();
        });
    }
    
    function refreshCaptcha() {
        const captchaImg = document.getElementById('captcha-img');
        captchaImg.src = '/captcha?' + Date.now();
    }
    
    document.addEventListener('DOMContentLoaded', function () {
        const flashMessages = {{ get_flashed_messages(with_categories=true) | tojson }};
        flashMessages.forEach(([category, message]) => {
            showToast(
                message,
                category,
                category === 'success' ? '操作成功' :
                category === 'error' ? '发生错误' :
                category === 'warning' ? '警告' : '系统通知'
            );
        });
    });
    </script>
</body>
</html>
